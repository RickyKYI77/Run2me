<!DOCTYPE html>
<html>
<head>
  <title>My Question 😎</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@400;700&family=Great+Vibes&family=Playfair+Display:ital@0;1&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      text-align: center;
      font-family: 'Playfair Display', serif;
      min-height: 100vh;
      background: radial-gradient(circle at 10% 30%, #ff9a9e, #fad0c4, #fad0c4);
      position: relative;
      overflow-x: hidden;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
    }

    h1 {
      font-size: 2.2rem;
      font-family: 'Great Vibes', cursive;
      margin: 20px;
      color: white;
      text-shadow: 0 0 10px #ff4d88, 0 0 20px #ff4d88;
      animation: glowPulse 2s infinite;
    }

    @keyframes glowPulse {
      0% { text-shadow: 0 0 5px #ff4d88; }
      100% { text-shadow: 0 0 25px #ff4d88, 0 0 35px #ff3388; }
    }

    button {
      padding: 14px 28px;
      font-size: 1.5rem;
      font-weight: bold;
      border: none;
      border-radius: 60px;
      margin: 15px;
      cursor: pointer;
      transition: all 0.2s ease;
      box-shadow: 0 8px 20px rgba(0, 0, 0, 0.2);
    }

    #yesBtn {
      background: linear-gradient(45deg, #ff4d88, #ff8da1);
      color: white;
      animation: wiggle 1s infinite;
    }

    @keyframes wiggle {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }

    #noBtn {
      background: #555;
      color: white;
      position: absolute;
      transition: all 0.05s linear;
    }

    .flower {
      position: absolute;
      font-size: 2.2rem;
      pointer-events: none;
      animation: floatBloom 1s ease-out forwards;
    }

    @keyframes floatBloom {
      0% {
        transform: scale(0) rotate(0deg);
        opacity: 1;
      }
      50% {
        transform: scale(1.3) rotate(180deg);
      }
      100% {
        transform: scale(1.8) rotate(360deg);
        opacity: 0;
        top: -50px;
      }
    }

    #msg {
      margin-top: 30px;
      font-size: 1.8rem;
      font-family: 'Dancing Script', cursive;
      background: rgba(255, 255, 255, 0.3);
      backdrop-filter: blur(8px);
      display: inline-block;
      padding: 12px 24px;
      border-radius: 60px;
      color: #b3004b;
      font-weight: bold;
    }

    .floating-heart {
      position: absolute;
      font-size: 1.5rem;
      animation: floatUp 4s linear forwards;
      pointer-events: none;
    }

    @keyframes floatUp {
      0% {
        transform: translateY(100vh) scale(0.5);
        opacity: 1;
      }
      100% {
        transform: translateY(-20vh) scale(1.2);
        opacity: 0;
      }
    }

    .ripple {
      position: absolute;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.6);
      transform: scale(0);
      animation: rippleAnim 0.8s ease-out;
      pointer-events: none;
    }

    @keyframes rippleAnim {
      to {
        transform: scale(8);
        opacity: 0;
      }
    }
  </style>
</head>
<body>

  <h1>Do you want to have fun with me? ❤️</h1>

  <button id="yesBtn">Yes 💕</button>
  <button id="noBtn">No 😈</button>

  <p id="msg"></p>

  <script>

    const yesBtn = document.getElementById('yesBtn');
    const noBtn = document.getElementById('noBtn');
    const msg = document.getElementById('msg');

    const flowers = ['🌸', '🌼', '🌻', '🌺', '💮', '🏵️', '🌷', '🌹', '💐', '🌸'];

    setInterval(function() {
      let heart = document.createElement('div');
      heart.className = 'floating-heart';
      heart.innerHTML = '❤️';
      heart.style.left = Math.random() * 100 + '%';
      heart.style.animationDuration = 3 + Math.random() * 3 + 's';
      heart.style.fontSize = 1 + Math.random() * 2 + 'rem';
      document.body.appendChild(heart);
      
      setTimeout(function() {
        heart.remove();
      }, 5000);
    }, 800);

    yesBtn.addEventListener('click', function(e) {
      msg.innerHTML = "DM me 'Ready' 🌸💖";

      for (let i = 0; i < 25; i++) {
        createFlower(e.target);
      }

      for (let i = 0; i < 8; i++) {
        createRipple(e);
      }
    });

    function createFlower(button) {
      let flower = document.createElement('div');
      flower.className = 'flower';
      flower.innerHTML = flowers[Math.floor(Math.random() * flowers.length)];

      let rect = button.getBoundingClientRect();
      flower.style.left = rect.left + rect.width / 2 + (Math.random() - 0.5) * 180 + 'px';
      flower.style.top = rect.top + rect.height / 2 + (Math.random() - 0.5) * 180 + 'px';

      document.body.appendChild(flower);

      setTimeout(function() {
        flower.remove();
      }, 1000);
    }

    function createRipple(event) {
      let ripple = document.createElement('div');
      ripple.className = 'ripple';
      ripple.style.left = event.clientX - 30 + 'px';
      ripple.style.top = event.clientY - 30 + 'px';
      ripple.style.width = '60px';
      ripple.style.height = '60px';
      document.body.appendChild(ripple);

      setTimeout(function() {
        ripple.remove();
      }, 800);
    }

    function moveNo() {
      let x = Math.random() * (window.innerWidth - 100);
      let y = Math.random() * (window.innerHeight - 100);
      noBtn.style.left = x + 'px';
      noBtn.style.top = y + 'px';
    }

    noBtn.addEventListener('mouseover', moveNo);
    noBtn.addEventListener('touchstart', moveNo);
    noBtn.addEventListener('touchmove', moveNo);
  </script>

</body>
</html>
